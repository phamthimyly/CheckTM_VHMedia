{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Trademark Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --text: #22160f;
            --muted: #7d6856;
            --accent: #d86e1f;
            --accent-dark: #8f430c;
            --line: #f1d5bb;
            --danger: #cf3f2d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(245, 173, 92, 0.22), transparent 34%),
                linear-gradient(135deg, #ffffff 0%, #fff5eb 55%, #ffe8d4 100%);
            padding: 24px;
        }
        .login-card {
            width: min(460px, 100%);
            padding: 34px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 24px 60px rgba(152, 91, 29, 0.16);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .brand img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 16px;
            background: #fff;
            padding: 8px;
            box-shadow: 0 12px 28px rgba(61, 34, 10, 0.12);
        }
        .brand-name {
            margin: 0;
            font-family: "Poppins", "Inter", sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--accent-dark);
        }
        h1 {
            margin: 0 0 8px;
            font-family: "Poppins", "Inter", sans-serif;
            font-size: 2rem;
        }
        .lead {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }
        form {
            display: grid;
            gap: 14px;
        }
        label {
            font-weight: 700;
            font-size: 0.92rem;
        }
        input {
            width: 100%;
            min-height: 50px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            padding: 0 14px;
            font: inherit;
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(216, 110, 31, 0.12);
        }
        button {
            min-height: 52px;
            border: 0;
            border-radius: 12px;
            background: linear-gradient(180deg, #df7a2d 0%, #ca6b22 100%);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }
        .error {
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(207, 63, 45, 0.1);
            color: var(--danger);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <section class="login-card">
        <div class="brand">
            <img src="{% static 'logo.png' %}" alt="VH Media logo">
            <p class="brand-name">VH Media</p>
        </div>
        <h1>Đăng nhập</h1>
        <p class="lead">Vào hệ thống để check trademark và xem dashboard thống kê.</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="username">Tài khoản</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Mật khẩu</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Đăng nhập</button>
        </form>
    </section>
</body>
</html>
